<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>1VERSUS1 Swiss Bracket</title>
  <style>
    :root {
      --bg:#000;
      --white:#f7f7f7;
      --red:#d9171d;
      --red-soft:#8b1115;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    html, body {
      width:100%; height:100%; margin:0; overflow:hidden;
      background:#000; color:var(--white);
      font-family:Arial, Helvetica, sans-serif;
    }
    body { display:grid; place-items:center; }
    .phone {
      position:relative;
      width:100vw; height:100svh;
      max-width:560px;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }
    .phone::before {
      content:""; position:absolute; inset:0; z-index:-3;
      background:
        linear-gradient(180deg, #000 0 27%, transparent 27% 65%, #000 65% 100%),
        radial-gradient(circle at 50% 42%, rgba(190,25,25,.18), transparent 22%),
        radial-gradient(circle at 50% 58%, rgba(140,15,15,.22), transparent 28%),
        #000;
    }
    .phone::after {
      content:""; position:absolute; inset:0; z-index:-2; pointer-events:none; opacity:.12;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.15) 0 1px, transparent 1.4px),
        radial-gradient(circle at 80% 65%, rgba(255,255,255,.1) 0 1px, transparent 1.4px),
        linear-gradient(45deg, transparent 0 48%, rgba(255,255,255,.025) 50%, transparent 52%),
        linear-gradient(-45deg, transparent 0 48%, rgba(255,255,255,.02) 50%, transparent 52%);
      background-size:18px 18px, 22px 22px, 90px 90px, 120px 120px;
      mix-blend-mode:screen;
    }

    .top {
      height:29.4%;
      display:flex; flex-direction:column; align-items:center;
      padding-top:5.8svh;
      background:linear-gradient(180deg, #000 0%, #000 82%, rgba(0,0,0,.82) 100%);
    }
    .one-logo {
      width:24.5%; max-width:140px; height:auto; object-fit:contain;
      filter:drop-shadow(0 0 8px rgba(255,255,255,.14));
      margin-bottom:1.15svh;
    }
    .swiss-logo {
      width:53.5%; max-width:314px; height:auto; object-fit:contain;
      filter:drop-shadow(0 10px 0 rgba(0,0,0,.7)) drop-shadow(0 0 18px rgba(255,0,0,.12));
    }

    .arena {
      position:relative;
      height:30.8%;
      padding:3.2svh 9.4vw 4.8svh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(165,20,20,.3) 0%, rgba(120,10,10,.16) 20%, rgba(0,0,0,0) 47%),
        linear-gradient(90deg, #060606 0%, #140809 11%, rgba(95,8,8,.86) 45%, rgba(125,10,10,.94) 50%, rgba(95,8,8,.86) 55%, #140809 89%, #060606 100%);
    }
    .arena::before {
      content:""; position:absolute; inset:0; pointer-events:none; opacity:.16;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 22%),
        radial-gradient(circle at 50% 55%, rgba(255,255,255,.07) 0 1px, transparent 1.3px);
      background-size:auto, 20px 20px;
      mix-blend-mode:screen;
    }
    .cards-row {
      width:100%;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      column-gap:7vw;
      position:relative; z-index:1;
      margin-top:1.6svh;
    }
    .card-shell { display:flex; justify-content:center; }
    .card {
      width:min(28.5vw, 154px);
      aspect-ratio:1447 / 2048;
      position:relative;
      transform-style:preserve-3d;
      filter:drop-shadow(0 14px 14px rgba(0,0,0,.62));
      will-change:transform, filter;
    }
    .card img {
      position:absolute; inset:0;
      width:100%; height:100%; object-fit:cover;
      backface-visibility:hidden;
    }
    .card.spin { animation:cardSpin 4s cubic-bezier(.10,.78,.20,1) both; }
    @keyframes cardSpin {
      0%   { transform:rotateY(0deg) scale(1); filter:blur(0px) drop-shadow(0 14px 14px rgba(0,0,0,.62)); }
      14%  { transform:rotateY(900deg) scale(1.018); filter:blur(3.4px) drop-shadow(0 20px 22px rgba(0,0,0,.70)); }
      32%  { transform:rotateY(1980deg) scale(1.028); filter:blur(4.2px) drop-shadow(0 23px 25px rgba(0,0,0,.73)); }
      54%  { transform:rotateY(2880deg) scale(1.024); filter:blur(3px) drop-shadow(0 20px 21px rgba(0,0,0,.69)); }
      74%  { transform:rotateY(3420deg) scale(1.012); filter:blur(1.5px) drop-shadow(0 16px 17px rgba(0,0,0,.66)); }
      90%  { transform:rotateY(3570deg) scale(1.005); filter:blur(.7px) drop-shadow(0 15px 16px rgba(0,0,0,.64)); }
      100% { transform:rotateY(3600deg) scale(1); filter:blur(0px) drop-shadow(0 14px 14px rgba(0,0,0,.62)); }
    }
    .versus {
      color:#f2f2f2;
      font-family:Arial, Helvetica, sans-serif;
      font-size:clamp(17px, 4.4vw, 27px);
      font-weight:900;
      line-height:1;
      text-shadow:0 0 9px rgba(255,255,255,.12);
      margin-top:2.1svh;
      letter-spacing:-.02em;
    }
    .tap-trigger {
      margin-top:2.1svh;
      background:none; border:none; outline:none;
      color:#f3f3f3;
      font-size:clamp(7px, 1.9vw, 10px);
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      padding:.45em .75em;
      cursor:pointer;
      text-shadow:0 0 10px rgba(255,255,255,.18), 0 0 18px rgba(255,0,0,.08);
      transition:transform .16s ease, text-shadow .16s ease, opacity .16s ease;
      opacity:.92;
    }
    .tap-trigger:active {
      transform:scale(.94);
      text-shadow:0 0 12px rgba(255,255,255,.36), 0 0 22px rgba(255,0,0,.22);
      opacity:1;
    }

    .bracket-section {
      height:32.5%;
      display:flex; align-items:center; justify-content:center;
      padding:2.4svh 4.6vw 2.6svh;
      background:#000;
    }
    .view-button {
      width:min(91vw, 490px);
      aspect-ratio:1920 / 1080;
      display:block;
      border:2px solid rgba(180,180,180,.78);
      background:#0c0c0c;
      overflow:hidden;
      box-shadow:0 0 28px rgba(130,0,0,.16);
      text-decoration:none;
      cursor:pointer;
      padding:0;
      position:relative;
    }
    .view-button img { width:100%; height:100%; object-fit:cover; display:block; }
    .view-button::after {
      content:""; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.08) 48%, transparent 58%);
      transform:translateX(-135%);
      animation:shine 3.2s ease-in-out infinite;
    }
    @keyframes shine { 0%,54% { transform:translateX(-135%); } 88%,100% { transform:translateX(135%); } }

    .footer {
      height:8%;
      display:grid; grid-template-columns:1fr 1fr 1fr; align-items:center;
      padding:0 7vw;
      background:#000;
      color:#f4f4f4;
      font-size:clamp(6px, 1.5vw, 9px);
      font-weight:700;
      letter-spacing:.04em;
    }
    .footer span:first-child,
    .footer span:last-child { font-style:italic; }
    .footer span:nth-child(2) { text-align:center; font-style:normal; white-space:nowrap; }
    .footer span:last-child { text-align:right; }
    .red { color:var(--red); }


    .modal {
      position:fixed; inset:0;
      background:rgba(0,0,0,.96);
      display:none;
      place-items:center;
      z-index:50;
      overflow:hidden;
    }
    .modal.open { display:grid; }
    .modal img {
      position:absolute;
      width:100svh;
      height:100vw;
      max-width:none;
      max-height:none;
      object-fit:contain;
      transform:rotate(90deg);
      filter:drop-shadow(0 0 22px rgba(255,0,0,.25));
    }
    .close {
      position:absolute;
      right:16px;
      top:16px;
      z-index:55;
      width:42px;
      height:42px;
      border:1px solid rgba(255,255,255,.65);
      border-radius:999px;
      background:rgba(0,0,0,.62);
      color:#fff;
      font-size:26px;
      line-height:1;
      cursor:pointer;
    }
    .hint {
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      z-index:55;
      font-size:11px;
      letter-spacing:.16em;
      font-weight:900;
      color:rgba(255,255,255,.68);
      white-space:nowrap;
    }

    @media (max-height: 760px) {
      .top { height:28.4%; padding-top:5svh; }
      .one-logo { margin-bottom:1svh; width:22%; }
      .swiss-logo { width:51%; }
      .arena { height:31.7%; padding-top:2.5svh; padding-bottom:3.8svh; }
      .bracket-section { height:32.8%; padding-top:2svh; }
      .card { width:min(26vw, 138px); }
      .tap-trigger { margin-top:1.4svh; }
    }
    @media (min-width: 520px) {
      .cards-row { column-gap:38px; }
      .arena { padding-left:56px; padding-right:56px; }
    }
  </style>
</head>

          <div class="card" id="leftCard"><img src="assets/player-card-back.jpg" alt="Left player card" /></div>
        </div>
        <div class="versus">VS</div>
        <div class="card-shell">
          <div class="card" id="rightCard"><img src="assets/player-card-back.jpg" alt="Right player card" /></div>
        </div>
      </div>
      <button class="tap-trigger" id="spinBtn" type="button">TAP HERE</button>
    </section>

    <section class="bracket-section">
      <button class="view-button" id="openBracket" type="button" aria-label="Preview Swiss bracket">
        <img src="assets/tap-to-view.jpg" alt="Tap to view Swiss bracket" />
      </button>
    </section>

    <footer class="footer">
      <span>ALL RIGHT RESERVED</span>
      <span>ONLY <b class="red">ONE</b> STAY. LET THE COURT BE THE JUDGE.</span>
      <span>© [2026] [1VERSUS1]</span>
    </footer>
  </main>

  <div class="modal" id="bracketModal" aria-hidden="true">
    <button class="close" id="closeBracket" type="button" aria-label="Close bracket">×</button>
    <img src="assets/swiss-bracket.jpg" alt="Swiss bracket preview" />
    <div class="hint">TAP × TO CLOSE</div>
  </div>

  <script>
    const back = 'assets/player-card-back.jpg';
    const leftList = [
      'assets/Player-Card-0218.jpg', // AFFIQ
      'assets/Player-Card-0221.jpg', // MIR
      'assets/Player-Card-0216.jpg', // ADAM
      'assets/Player-Card-0217.jpg'  // HARIZ
    ];
    const rightList = [
      'assets/Player-Card-0220.jpg', // LUQMAN
      'assets/Player-Card-0219.jpg', // IRHAM
      'assets/Player-Card-0222.jpg', // SHAFIK
      'assets/Player-Card-0223.jpg'  // NAME
    ];

    const leftCard = document.getElementById('leftCard');
    const rightCard = document.getElementById('rightCard');
    const leftImg = leftCard.querySelector('img');
    const rightImg = rightCard.querySelector('img');
    const spinBtn = document.getElementById('spinBtn');

    let pairIndex = 0;
    let busy = false;

    spinBtn.addEventListener('click', () => {
      if (busy) return;
      busy = true;

      const nextLeft = pairIndex < leftList.length ? leftList[pairIndex] : back;
      const nextRight = pairIndex < rightList.length ? rightList[pairIndex] : back;

      leftCard.classList.remove('spin');
      rightCard.classList.remove('spin');
      void leftCard.offsetWidth;
      leftCard.classList.add('spin');
      rightCard.classList.add('spin');

      setTimeout(() => {
        leftImg.src = nextLeft;
        rightImg.src = nextRight;
      }, 2500);

      setTimeout(() => {
        leftCard.classList.remove('spin');
        rightCard.classList.remove('spin');
        pairIndex = pairIndex < leftList.length ? pairIndex + 1 : 0;
        busy = false;
      }, 4020);
    });

    const modal = document.getElementById('bracketModal');
    const openBracket = document.getElementById('openBracket');
    const closeBracket = document.getElementById('closeBracket');

    openBracket.addEventListener('click', () => {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    });

    closeBracket.addEventListener('click', () => {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    });

    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }
    });
  </script>
</body>
</html>
